_schema-version: "3.1"
ID: joule-mcp-research-server
version: 1.0.0
description: CAP MCP Server for Joule agents - Perplexity Sonar via SAP Generative AI Hub

parameters:
  enable-parallel-deployments: true

modules:

  # ─── Módulo principal CAP ────────────────────────────────────────────────────
  - name: joule-mcp-srv
    type: nodejs
    path: .
    parameters:
      buildpack: nodejs_buildpack
      memory: 512M
      disk-quota: 1G
      health-check-type: http
      health-check-http-endpoint: /health
    build-parameters:
      builder: npm
      build-result: .
      ignore:
        - .env
        - default-env.json
        - .cdsrc-private.json
        - node_modules/
        - test/
        - coverage/
        - mta_archives/
        - "*.log"
    properties:
      AICORE_RESOURCE_GROUP: default
      GENAIHUB_DEPLOYMENT_ID: d42cc6a9f1d2b9fb
      GENAIHUB_MODEL_NAME: sonar
      GENAIHUB_ALLOWED_MODELS: sonar,sonar-pro
      MCP_REQUIRE_AUTH: true
      LOG_LEVEL: info
      NODE_ENV: production
    requires:
      - name: joule-mcp-xsuaa
      - name: aicore-default
    provides:
      - name: joule-mcp-srv-api
        properties:
          url: ${default-url}

  # ─── Destination content - cria destination na subaccount ───────────────────
  # Este módulo popula o Destination Service com a entrada necessária para o
  # Joule Studio descobrir e chamar o MCP server com OAuth2ClientCredentials.
  - name: joule-mcp-destination-content
    type: com.sap.application.content
    requires:
      - name: joule-mcp-destination-service
        parameters:
          content-target: true
      - name: joule-mcp-xsuaa
        parameters:
          service-key:
            name: joule-mcp-xsuaa-destination-key
      - name: joule-mcp-srv-api
    parameters:
      content:
        subaccount:
          destinations:
            - Name: joule-mcp-research-server
              Description: MCP Research Server for Joule Studio - Perplexity Sonar via SAP AI Core
              # URL do app sem trailing /mcp - Joule Studio adiciona automaticamente
              URL: ~{joule-mcp-srv-api/url}
              Authentication: OAuth2ClientCredentials
              # O Destination Service resolve clientid/clientsecret da service-key automaticamente
              TokenServiceInstanceName: joule-mcp-xsuaa
              TokenServiceKeyName: joule-mcp-xsuaa-destination-key
              # Propriedade obrigatória para visibilidade no Joule Studio
              "sap-joule-studio-mcp-server": "true"
          existing_destinations_policy: update
    build-parameters:
      no-source: true

resources:

  # ─── XSUAA - criado pelo MTA ─────────────────────────────────────────────────
  - name: joule-mcp-xsuaa
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: joule-mcp-research-server-${org}-${space}
        tenant-mode: dedicated

  # ─── SAP AI Core - instância EXISTENTE ──────────────────────────────────────
  # resource lógico no MTA:   aicore-default
  # service instance no CF:   default_aicore
  # AI Core resource group:   default  (env AICORE_RESOURCE_GROUP)
  - name: aicore-default
    type: org.cloudfoundry.existing-service
    parameters:
      service-name: default_aicore

  # ─── Destination Service - instância EXISTENTE na subaccount ────────────────
  # Requer que o Destination Service esteja habilitado na subaccount BTP.
  # Se ainda não existir uma instância, alterar para org.cloudfoundry.managed-service
  # com service: destination e service-plan: lite.
  - name: joule-mcp-destination-service
    type: org.cloudfoundry.existing-service
    parameters:
      service-name: destination-service
